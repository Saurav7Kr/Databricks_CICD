bundle:
  name: dab_tutorial # define bundle name
  uuid: e28f5bec-dfd7-4133-a093-161f34f15c53 # identifier for this bundle

include: 
  - resources/*.yml
  - resources/*/*.yml

# artifacts:  # Not using for now
#   python_artifact:
#     type: whl
#     build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: dbc-9b594d91-aac1.cloud.databricks.com
    permissions:
      - group_name: admins
        level: CAN_MANAGE
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false
    # variables:
    #   catalog: workspace
    #   schema: ${workspace.current_user.short_name}

  prod:
    mode: production
    workspace:
      host: dbc-9b594d91-aac1.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sauravkumar786ss@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: sauravkumar786ss@gmail.com
        level: CAN_MANAGE
      - group_name: admins
        level: CAN_RUN
